# GuildShelter 配置
# 语言设置: zh_CN(中文) / en_US(英文)，语言文件在 plugins/GuildShelter/messages_*.yml
language: zh_CN

# 代理模式: none(单服) | bungeecord(BungeeCord 代理) | velocity(Velocity 代理)
# 设为 bungeecord/velocity 时：
#   - storage.type 自动强制 mysql（多服共享数据）
#   - /gs visit 和 /gs home 支持跨服传送
#   - 需在代理端配置 forwarding mode
proxy: none

# 本服务器名称（跨服模式必填，每台服不同，如 "survival" / "creative"）
# 用于标识公会营地在哪台服务器上，代理跨服传送时使用
server-name: ""

# 每日维护费（从公会资金扣除，余额不足广播警告）
upkeep:
  enabled: false          # 是否启用每日维护费
  base-cost: 100          # 基础费用（1 级公会）
  per-level-cost: 50      # 每级加收
  check-hour: 0           # 每天几点执行（0-23，服务器时间）

# 单位说明：chunk = 16 方块；cell(格) = 一块庄园 + 一条路（网格的基本单元）

# ========================= 常用设置（你通常只需要改这里）=========================

# 成员庄园：每个成员一块，随庄园升级从初始长到满级。
# 角落扩张式——锚定庄园一角，从角落向外逐级扩，满级铺满整块。
member-plot:
  initial-chunks: 6     # 初始边长（1 级）= 96×96 方块
  max-chunks: 15        # 满级边长 = 240×240 方块
  grow-per-level: 1     # 每升一级 +1 chunk（+16 方块）→ 升满需 (15-6)/1+1 = 10 级
                        # (庄园满级数由这三项自动推出，无需另设)

# 公会主城：全公会共享的中央出生广场，占【中心那一格】角落的一块方形区域，按 chunk 配置、
# 角落锚定（出生点在角落）、随公会升级从 initial 长到 max。主城【四周自动被路环绕】——
# 中心格里主城之外的部分全是路，再外面才是成员庄园网格。
#   1 chunk = 16 方块。max-chunks 必须 ≤ member-plot.max-chunks(默认15)，因为主城要容在中心一格里。
#   想要更大的主城：调大下面的 max-chunks（上限=member-plot.max-chunks）；若还嫌小，就把
#   member-plot.max-chunks 一起调大（那会同时放大每块成员庄园）。
main-city:
  initial-chunks: 5     # 初始边长（chunk，1 级公会）→ 6 chunk = 96×96 方块
  max-chunks: 15        # 最大边长（chunk，满级达到）→ 15 chunk = 240×240 方块（= 一块满级成员庄园大小）

# 道路宽度（路面顶层会自动铺成路面块，并清掉路上的植被/树/竹子；terrain-prep=NONE 时不铺）
road-chunks: 1          # = 16 方块
# 陆地路面方块（命名空间 id，支持模组方块；默认土径）。例: minecraft:stone_bricks / minecraft:dirt_path
road-surface-block: minecraft:dirt_path
# 水面桥（路穿过水面那段架的栈桥）：桥面 + 护栏，可分别自定义。
#   auto = 按群系自动选木（针叶林→云杉、丛林→丛林木、其余→橡木，护栏同理）。
road-bridge-block: auto        # 桥面块，如 minecraft:oak_planks
road-bridge-rail-block: auto   # 桥边护栏块，如 minecraft:oak_fence

# 海洋换种子重建：首建公会营地时，若主城网格区域水占比过高，自动换随机种子重建，
# 直到拿到陆地为主的世界。避免世界开在整片海洋——那样铺路会架成千上万列水面桥，
# 压垮混合端的区块/光照子系统导致崩服。仅对自然地形(非 VOID/FLAT)、且世界首次创建时生效；
# 卸载后重载已存档世界绝不触发（不会动玩家建筑）。
ocean-reseed:
  enabled: true            # 关掉则沿用旧行为（只锚定主城中心，整片网格仍可能泡海）
  max-water-ratio: 0.5     # 主城区域水占比超过此值(0~1)就换种子重建
  max-attempts: 8          # 最多重建次数，超过则接受最后一个并告警
  sample-grid: 12          # 主城区域上的采样网格边数(12 → 12×12=144 个探点)

# 主城围墙：沿最大主城 footprint 外缘建一圈墙。
# 注意：主城现在是中心一格大小、四面环路，所以默认【关闭】；想要可设 enabled: true，
# 并用 /gs admin citywall <公会> 给已建好的公会补建。
city-wall:
  enabled: false                      # 默认关；开了会把主城 footprint 四边围起来
  block: minecraft:cobblestone_wall   # 围墙方块，如 minecraft:oak_fence / minecraft:stone_brick_wall
  height: 1                           # 墙高（格）

# 公会等级与容量
guild:
  max-level: 5          # 公会最高等级
  members-per-level: 5  # 每升一级放开的成员名额（容量 = 等级 × 本值，满级 5×5 = 25 人）
                        # 名额满了新成员加不进，需先升级公会；边界按当前容量画出预留空地

# 分配/升级庄园时的整地方式: NONE(不整) | CLEAR_VEGETATION(清植被,保留起伏) | FLATTEN(铺平)
terrain-prep: CLEAR_VEGETATION

# 存储后端：sqlite(默认,单文件免配置) | mysql(多服共享) | flatfile(不用数据库,纯文本文件)
storage:
  type: sqlite
  # 仅 type=mysql 时用：
  mysql:
    host: localhost
    port: 3306
    database: guildshelter
    user: root
    password: ""

# 领地保护：开启后非授权者不能在公会营地破坏/放置/交互/倒水。
# 规则：非本公会成员全禁；成员可建主城；路任何人不可动；庄园仅庄主且在实占范围内可动。
# OP 与持 guildshelter.admin 权限者一律放行。
protection: true

# ===================== 公会插件适配（按你服务器实际装的插件）=====================

# Shetuan(社团)：不发事件 → 定时 diff 同步成员名单与庄园。仅装了 Shetuan 时生效。
shetuan:
  sync-interval-seconds: 30   # 同步间隔（秒），越短越实时越短越省

# Guild(com.guild)：不发事件 → 定时同步 + 玩家敲 /guild 后命令即时触发。仅装了 Guild 时生效。
guild-plugin:
  sync-interval-seconds: 30       # 轮询间隔（秒），即时触发的安全网
  instant-trigger: true           # 玩家敲 /guild 后主动同步一次，建会/入会近即时出世界
  instant-trigger-delay-ticks: 2  # 即时触发延迟多少 tick 再读名单（20 tick = 1 秒）
  disband-sweep: true             # 自动清扫已解散公会的世界（单公会插件保持 true）

# ============================ 性能优化 ============================

performance:
  # 实体/掉落物上限
  limits:
    max-dropped-items: 500       # 庄园内掉落物上限（-1=不限）
    max-tile-entities: 2000      # 庄园内方块实体上限（-1=不限，超限拦截新放置）
    check-interval-seconds: 60   # 定时检查频率
    drop-cleanup-mode: clean     # clean=清理最旧+拦截新的 | block=只拦截新的

  # 世界级懒加载/卸载
  optimize:
    enabled: false
    mode: world                   # world=卸载整个世界 | chunk=只卸载非主城chunk
    inactive-minutes: 30          # 无玩家超过N分钟才卸载
    check-interval-seconds: 300   # 检查频率（5分钟）
    keep-spawn-loaded: true       # 主城出生点chunk永不卸载

  # 性能统计 + 排行广播
  stats:
    enabled: false
    broadcast-interval-seconds: 1800  # 30分钟广播一次
    top-count: 5                      # 显示前N名
    weights:
      tile-tick: 0.005              # 每个方块实体的tick权重
      entity-tick: 0.005            # 每个生物的tick权重
      drop-tick: 0.0001             # 每个掉落物的tick权重
      chunk-tick: 0                 # 每个chunk的tick权重

  # 庄园级区块卸载
  chunk-unload:
    enabled: false
    inactive-minutes: 15          # 庄园主人不在线超过N分钟卸载
    check-interval-seconds: 120   # 检查频率
    keep-road-loaded: true        # 道路chunk不卸载

# ============================ 搬家系统 ============================

# 搬家：玩家跳槽公会时，把庄园建筑从旧公会营地复制到新公会营地。
# chunk 级复制，TileEntity NBT 完整保留（AE2 存储盘/ME 网络等模组数据安全）。
manor-move:
  enabled: true            # 是否启用搬家功能
  cost: 10000              # 搬家费用（需 Vault 经济插件，0=免费）
  cooldown-days: 7         # 搬家冷却天数（防止频繁搬家）

# ============================ 高级（一般不用动）============================
advanced:
  base-y: 64            # 地面高度
  margin-chunks: 2      # 世界边界在已分配范围外额外留的余量 = 32 方块
