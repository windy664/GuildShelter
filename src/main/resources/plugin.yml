name: GuildShelter
main: org.windy.guildshelter.GuildShelterPlugin
version: 1.4-SNAPSHOT
api-version: 1.26
softdepend:
  - PlayerGuild
  - LegendaryGuild
  - LegendaryGuildRemapped
  - Shetuan
  - Guild
# 运行期由服务端的库加载器拉取(不打进 jar)。Youer(Spigot 系) 1.26 应支持; 若不支持需改为 shade。
libraries:
  - com.zaxxer:HikariCP:5.0.0
  - org.xerial:sqlite-jdbc:3.47.1.0
  - com.mysql:mysql-connector-j:8.4.0
commands:
  gs:
    description: GuildShelter 插件命令
    usage: /gs <home|spawn|upgrade|info|trust|untrust|list|visit|clear> | /gs admin ...
