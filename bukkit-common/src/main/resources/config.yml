# GuildShelter 配置
# 语言设置: zh_CN(中文) / en_US(英文)，语言文件在 plugins/GuildShelter/messages_*.yml
language: zh_CN

# 代理模式: none(单服) | bungeecord(BungeeCord 代理) | velocity(Velocity 代理)
# 设为 bungeecord/velocity 时：
#   - storage.type 自动强制 mysql（多服共享数据）
#   - /gs visit 和 /gs home 支持跨服传送
#   - 需在代理端配置 forwarding mode
proxy: none

# 本服务器名称（跨服模式必填，每台服不同，如 "survival" / "creative"）
# 用于标识公会营地在哪台服务器上，代理跨服传送时使用
server-name: ""

# 每日维护费（从公会资金扣除，余额不足广播警告）
upkeep:
  enabled: false          # 是否启用每日维护费
  base-cost: 100          # 基础费用（1 级公会）
  per-level-cost: 50      # 每级加收
  check-hour: 0           # 每天几点执行（0-23，服务器时间）

# 单位说明：chunk = 16 方块；cell(格) = 一块庄园 + 一条路（网格的基本单元）

# ========================= 常用设置（你通常只需要改这里）=========================

# 【等级系统已独立到 levels.yml】——庄园等级、公会等级、主城额度都在那里配置。
# 成员庄园采用【额度 + 自由解锁】：庄园等级决定解锁额度上限，玩家 /gs unlock 解锁脚下相邻 chunk
# （不能飞地、形状自由），/gs upgrade 升级只抬高额度上限、不自动整地。主城同理，但额度跟公会等级、
# 只有会长/副会长能解锁。

# 道路宽度（路面顶层会自动铺成路面块，并清掉路上的植被/树/竹子；terrain-prep=NONE 时不铺）
road-chunks: 1          # = 16 方块
# 陆地路面方块（命名空间 id，支持模组方块；默认土径）。例: minecraft:stone_bricks / minecraft:dirt_path
road-surface-block: minecraft:dirt_path
# 水面桥（路穿过水面那段架的栈桥）：桥面 + 护栏，可分别自定义。
#   auto = 按群系自动选木（针叶林→云杉、丛林→丛林木、其余→橡木，护栏同理）。
road-bridge-block: auto        # 桥面块，如 minecraft:oak_planks
road-bridge-rail-block: auto   # 桥边护栏块，如 minecraft:oak_fence
# 道路是否允许【假玩家】(模组部署器/机械臂/采石场假人等非真实在线玩家)破坏/放置。
# 默认 false：防止玩家用自动化设备拆掉/占用公共道路。仅约束【道路】——玩家在自己庄园/主城里的自动化照常不受影响。
# (该限制走 NeoForge 侧保护；纯 Bukkit 端道路本就对所有人禁建，无需此项。)
road-allow-fake-players: false

# 海洋换种子重建：首建公会营地时，若主城网格区域水占比过高，自动换随机种子重建，
# 直到拿到陆地为主的世界。避免世界开在整片海洋——那样铺路会架成千上万列水面桥，
# 压垮混合端的区块/光照子系统导致崩服。仅对自然地形(非 VOID/FLAT)、且世界首次创建时生效；
# 卸载后重载已存档世界绝不触发（不会动玩家建筑）。
ocean-reseed:
  enabled: true            # 关掉则沿用旧行为（只锚定主城中心，整片网格仍可能泡海）
  max-water-ratio: 0.5     # 主城区域水占比超过此值(0~1)就换种子重建
  max-attempts: 8          # 最多重建次数，超过则接受最后一个并告警
  sample-grid: 12          # 主城区域上的采样网格边数(12 → 12×12=144 个探点)

# 主城围墙：沿主城整格 footprint(=中心一格)外缘建一圈墙。
# 注意：主城独占中心一格、四面环路，墙贴路的边会自动留口，所以默认【关闭】；想要可设 enabled: true，
# 并用 /gs admin citywall <公会> 给已建好的公会补建。
city-wall:
  enabled: false                      # 默认关；开了会把主城整格 footprint 四边围起来
  block: minecraft:cobblestone_wall   # 围墙方块，如 minecraft:oak_fence / minecraft:stone_brick_wall
  height: 1                           # 墙高（格）

# 分配/升级庄园时的整地方式: NONE(不整) | CLEAR_VEGETATION(清植被,保留起伏) | FLATTEN(铺平)
terrain-prep: CLEAR_VEGETATION

# Iris 地形引擎联动（强烈推荐）：
#   检测到服务器装了 Iris 插件 → 公会自然世界改用 Iris 生成，专业大地形 + 性能强出几百倍。
#   没装 Iris → 退回普通 vanilla normal 世界。
# 软依赖，无需把 Iris 作为前置；装了就自动用，没装也能跑。
# ⚠️ Iris 地形可能很崎岖，铺路/整地仍按实际地表施工，落差大处道路会切坡 —— 按需调 terrain-prep / road-chunks。
iris:
  enabled: true            # Iris 在场时是否启用（false=即使装了 Iris 也用普通地形）
  dimension: overworld     # 用哪个 Iris 维度包名（Iris 自带 overworld；装了其它包填包名）

# 存储后端：sqlite(默认,单文件免配置) | mysql(多服共享) | flatfile(不用数据库,纯文本文件)
storage:
  type: sqlite
  # 仅 type=mysql 时用：
  mysql:
    host: localhost
    port: 3306
    database: guildshelter
    user: root
    password: ""

# 领地保护：开启后非授权者不能在公会营地破坏/放置/交互/倒水。
# 规则：非本公会成员全禁；主城仅会长/副会长/受信任成员且在【已解锁】城地可动(未解锁城地=保护中)；路任何人不可动；庄园仅庄主且在实占范围内可动。
# OP 与持 guildshelter.admin 权限者一律放行。
protection: true

# 主城禁放方块：公会主城是【公共建设用地】，默认禁止放置下列方块，防止玩家把主城改成
# 生产/红石工厂/刷怪农场用地（即便他有建造权也挡）。仅约束【主城放置】——玩家自己庄园不受限。
# 写命名空间 id（支持模组方块）；留空 [] = 不限制。OP / guildshelter.admin 不受限（方便布景）。
# 模组方块走 NeoForge 侧拦截（混合端），原版方块两端都拦。
main-city-blocked-blocks:
  # —— 原版：自动化/红石/刷怪类 ——
  - minecraft:hopper
  - minecraft:dropper
  - minecraft:dispenser
  - minecraft:piston
  - minecraft:sticky_piston
  - minecraft:observer
  - minecraft:spawner
  - minecraft:tnt
  # —— 模组方块示例（按你服装的模组改/增删；下面几行默认注释掉）——
  # - create:mechanical_drill
  # - create:mechanical_press
  # - create:basin
  # - mekanism:metallurgic_infuser
  # - thermal:machine_pulverizer
  # - industrialforegoing:laser_drill

# 主城实体/掉落物限额：主城不像庄园按等级配额，这里给全公会主城一组【固定上限】，
# 防止公共主城被掉落物/生物/方块实体堆爆。范围=整个主城 footprint。-1=该项不限。
# 掉落物清理沿用 performance.drop-cleanup.mode（clean=超限清最旧 / block=只拦新放置）。
main-city-limits:
  enabled: false             # 默认关；开了才生效
  max-dropped-items: 300     # 主城掉落物上限
  max-tile-entities: 1500    # 主城方块实体(箱子/熔炉/告示牌…)总数上限，超限拦新放置
  max-animals: -1            # 主城被动动物上限
  max-hostiles: -1           # 主城敌对生物上限
  max-mobs: -1               # 主城生物总数(动物+敌对+其它)上限
  max-vehicles: -1           # 主城载具(船/矿车)上限

# 主城悬浮字（需安装 DecentHolograms 插件，软依赖；没装则本功能静默关闭）。
# 会长/副会长站在主城内用 /gs holo add <文字> 创建公告/欢迎语；数量按公会封顶。
# 多行：文字里用 | 分隔，如 /gs holo add §6公会公告|§f今晚活动 8 点
main-city-holograms:
  enabled: true              # 是否启用（还需 DecentHolograms 在场才真正生效）
  max-per-guild: 5           # 每公会主城悬浮字数量上限

# ===================== 公会插件适配（按你服务器实际装的插件）=====================

# Shetuan(社团)：不发事件 → 定时 diff 同步成员名单与庄园。仅装了 Shetuan 时生效。
shetuan:
  sync-interval-seconds: 30   # 同步间隔（秒）：越短越实时，越长越省性能

# Guild(com.guild)：不发事件 → 定时同步 + 玩家敲 /guild 后命令即时触发。仅装了 Guild 时生效。
guild-plugin:
  sync-interval-seconds: 30       # 轮询间隔（秒），即时触发的安全网
  instant-trigger: true           # 玩家敲 /guild 后主动同步一次，建会/入会近即时出世界
  instant-trigger-delay-ticks: 2  # 即时触发延迟多少 tick 再读名单（20 tick = 1 秒）
  disband-sweep: true             # 自动清扫已解散公会的世界（单公会插件保持 true）

# ============================ 性能优化 ============================

performance:
  # 【庄园等级的优化限制（掉落物/方块实体/生物/载具/机器）已移到 levels.yml 的 manor.limits】——
  #   那里按"几级 → 多少"明确配置；管理员还能 /gs admin limit 给单个庄园加增量。
  # 这里只放与等级无关的【清理任务参数】和其它性能开关。

  # 掉落物定时清理任务（上限由 levels.yml manor.limits 的 drops 决定）：
  drop-cleanup:
    check-interval-seconds: 60   # 定时检查频率（秒）
    mode: clean                  # clean=清理最旧+拦截新 | block=只拦截新（不删存量）

  # 世界级懒加载/卸载
  optimize:
    enabled: false
    mode: world                   # world=卸载整个世界 | chunk=只卸载非主城chunk
    inactive-minutes: 30          # 无玩家超过N分钟才卸载
    check-interval-seconds: 300   # 检查频率（5分钟）
    keep-spawn-loaded: true       # 主城出生点chunk永不卸载

  # 性能统计 + 排行广播
  stats:
    enabled: false
    broadcast-interval-seconds: 1800  # 30分钟广播一次
    top-count: 5                      # 显示前N名
    weights:
      tile-tick: 0.005              # 每个方块实体的tick权重
      entity-tick: 0.005            # 每个生物的tick权重
      drop-tick: 0.0001             # 每个掉落物的tick权重
      chunk-tick: 0                 # 每个chunk的tick权重

  # 庄园级区块卸载
  chunk-unload:
    enabled: false
    inactive-minutes: 15          # 庄园主人不在线超过N分钟卸载
    check-interval-seconds: 120   # 检查频率
    keep-road-loaded: true        # 道路chunk不卸载

# ============================ 搬家系统 ============================

# 搬家：玩家跳槽公会时，把庄园建筑从旧公会营地复制到新公会营地。
# chunk 级复制，TileEntity NBT 完整保留（AE2 存储盘/ME 网络等模组数据安全）。
manor-move:
  enabled: true            # 是否启用搬家功能
  cost: 10000              # 搬家费用（需 Vault 经济插件，0=免费）
  cooldown-days: 7         # 搬家冷却天数（防止频繁搬家）

# ====================== 庄园升级命令回调 ======================

# 庄园升到「对应等级」时，由控制台执行「对应命令」（管理员 /gs admin upgrade-manor 触发）。
# 只执行升到的那一级配的命令（不累加更低等级）。命令以控制台身份执行，故 give/cmi/lp 等任意插件命令均可挂接。
# 占位符: %player%(庄主名) %uuid% %guild%(公会ID) %level%(新等级) %old_level%(旧等级) %slot%
manor-upgrade-commands:
  enabled: false           # 默认关；要用改 true 并按需配置下方 levels
  levels:                  # 键 = 升到的目标等级，值 = 该等级要执行的命令列表（不带前导 /）
    2:
      - "broadcast §a%player% §f的庄园升到了 §e2 §f级！"
    3:
      - "give %player% diamond 8"
    5:
      - "lp user %player% parent add manor-vip"

# ====================== 多庄园（一人多块）======================

# 默认每个公会成员自动分配一块庄园。开启后玩家可用 /gs claim 认领更多块，
# 数量上限 = 权限节点 guildshelter.manors.<N> 与 default-limit 的较大者；
# guildshelter.manors.unlimited = 无限。多数玩家命令将作用于"脚下站的这块"。
multi-manor:
  enabled: false           # 默认关；关=保持一人一庄园旧行为（安全灰度）
  default-limit: 1         # 无权限节点时每人可拥有的庄园数
  max-probe: 64            # 权限节点 guildshelter.manors.<N> 向上探测上限（防遍历过大）
  claim-cost: 0            # 自助认领花费（需 Vault，0=免费）

# ============================== UI 后端 ==============================

# 菜单渲染后端（GUI 入口尚在开发中，暂不影响现有命令）：
#   auto    - 自动：配套 UI 模组就绪则用模组联动，否则回退原版 Inventory
#   vanilla - 强制原版 Inventory 胸 GUI（兼容性最好）
#   mod     - 强制模组联动自定义界面（模组未就绪时无法打开菜单）
# 说明：菜单数据模型平台中立，易变的 Inventory API 已隔离，后续模组联动 UI 走通道下发。
ui:
  backend: auto

# ============================ 高级（一般不用动）============================
advanced:
  base-y: 64            # 地面高度
  margin-chunks: 2      # 世界边界在已分配范围外额外留的余量 = 32 方块
