modLoader = "javafml"
loaderVersion = "[4,)"
license = "All Rights Reserved"

# 在 Xaero 锁定 highlighter 列表前注册本 mod 的 highlighter（见 GsWorldMapSessionMixin）。
[[mixins]]
config = "gsmap.mixins.json"

[[mods]]
modId = "gsmap"
version = "1.0.0"
displayName = "GuildShelter Xaero Claims"
description = "在 Xaero 世界地图上显示公会营地领地并支持点击圈地（GuildShelter 客户端联动）。仅客户端。"
authors = "windy"

# 仅客户端 mod：服务端不需要装。
[[dependencies.gsmap]]
modId = "neoforge"
type = "required"
versionRange = "[26,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.gsmap]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,27)"
ordering = "NONE"
side = "CLIENT"

# Xaero 世界地图：必须在场（本 mod 就是给它加圈地高亮的）。
[[dependencies.gsmap]]
modId = "xaeroworldmap"
type = "required"
versionRange = "[1.41,)"
ordering = "AFTER"
side = "CLIENT"
